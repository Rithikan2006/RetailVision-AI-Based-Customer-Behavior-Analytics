<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RetailVision - Login (Static Demo)</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #090d16;
            --card-bg: rgba(17, 25, 40, 0.65);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-indigo: #6366f1;
            --accent-blue: #3b82f6;
            --accent-cyan: #06b6d4;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-primary);
            font-family: 'Outfit', sans-serif;
            margin: 0;
            overflow: hidden;
            min-height: 100vh;
            display: flex;
            align-items: center;
            position: relative;
        }

        .glow-bg-1 {
            position: absolute;
            top: 10%;
            left: 10%;
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
            z-index: -1;
            pointer-events: none;
        }

        .glow-bg-2 {
            position: absolute;
            bottom: 10%;
            right: 15%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(6, 182, 212, 0.12) 0%, rgba(0, 0, 0, 0) 70%);
            z-index: -1;
            pointer-events: none;
        }

        .login-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .login-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px 0 rgba(99, 102, 241, 0.15);
        }

        .logo-icon {
            font-size: 3rem;
            display: inline-block;
            filter: drop-shadow(0 0 10px rgba(99, 102, 241, 0.5));
        }

        .logo-text {
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, var(--text-primary) 30%, var(--accent-indigo));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo-sub {
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 300;
        }

        .form-label-custom {
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .form-control-custom {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-primary) !important;
            padding: 12px 16px;
            font-size: 0.95rem;
            transition: border-color 0.25s, box-shadow 0.25s;
        }

        .form-control-custom:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--accent-indigo);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.25);
            outline: none;
        }

        .form-control-custom::placeholder {
            color: rgba(255, 255, 255, 0.25);
        }

        .btn-primary-custom {
            background: linear-gradient(135deg, var(--accent-indigo), var(--accent-blue));
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: filter 0.2s, transform 0.1s;
        }

        .btn-primary-custom:hover {
            filter: brightness(1.1);
        }

        .btn-primary-custom:active {
            transform: scale(0.98);
        }

        .alert-danger-custom {
            background-color: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
            border-radius: 12px;
            font-size: 0.9rem;
        }

        .footer-hint {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.4);
        }

        .credentials-tag {
            background-color: rgba(255, 255, 255, 0.07);
            color: var(--accent-cyan);
            padding: 2px 6px;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="glow-bg-1"></div>
    <div class="glow-bg-2"></div>
    
    <div class="container d-flex justify-content-center align-items-center min-vh-100">
        <div class="login-card p-5 text-center">
            <div class="logo-area mb-4">
                <span class="logo-icon">👁️</span>
                <h1 class="logo-text mt-2">RetailVision</h1>
                <p class="logo-sub">Customer Behavior & Store Analytics</p>
            </div>
            
            <div id="error-alert" class="alert alert-danger-custom mb-4 d-none" role="alert">
                Invalid username or password.
            </div>
            
            <form id="login-form" onsubmit="handleLogin(event)">
                <div class="mb-4 text-start">
                    <label for="username" class="form-label-custom">Username</label>
                    <input type="text" class="form-control-custom w-100" id="username" required placeholder="Enter username (e.g. admin)">
                </div>
                
                <div class="mb-4 text-start">
                    <label for="password" class="form-label-custom">Password</label>
                    <input type="password" class="form-control-custom w-100" id="password" required placeholder="Enter password (e.g. admin123)">
                </div>
                
                <button type="submit" class="btn-primary-custom w-100 py-3 mt-2">Sign In</button>
            </form>
            
            <div class="footer-hint mt-4">
                <p class="mb-1">Demo credentials:</p>
                <code class="credentials-tag">admin / admin123</code> or <code class="credentials-tag">manager / manager123</code>
            </div>
        </div>
    </div>

    <script>
        // Check if already signed in
        if (localStorage.getItem('username')) {
            window.location.href = 'dashboard.html';
        }

        function handleLogin(e) {
            e.preventDefault();
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value;
            const alertBox = document.getElementById('error-alert');

            if ((user === 'admin' && pass === 'admin123') || (user === 'manager' && pass === 'manager123')) {
                localStorage.setItem('username', user);
                localStorage.setItem('role', user === 'admin' ? 'admin' : 'manager');
                window.location.href = 'dashboard.html';
            } else {
                alertBox.classList.remove('d-none');
            }
        }
    </script>
</body>
</html>
