<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RetailVision - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="login-body">
    <div class="glow-bg-1"></div>
    <div class="glow-bg-2"></div>
    
    <div class="container d-flex justify-content-center align-items-center min-vh-100">
        <div class="login-card p-5 text-center">
            <div class="logo-area mb-4">
                <span class="logo-icon">👁️</span>
                <h1 class="logo-text mt-2">RetailVision</h1>
                <p class="logo-sub">Customer Behavior & Store Analytics</p>
            </div>
            
            {% if error %}
            <div class="alert alert-danger-custom mb-4" role="alert">
                {{ error }}
            </div>
            {% endif %}
            
            <form action="{{ url_for('login') }}" method="POST">
                <div class="mb-4 text-start">
                    <label for="username" class="form-label-custom">Username</label>
                    <input type="text" class="form-control-custom" id="username" name="username" required placeholder="Enter username (e.g. admin)">
                </div>
                
                <div class="mb-4 text-start">
                    <label for="password" class="form-label-custom">Password</label>
                    <input type="password" class="form-control-custom" id="password" name="password" required placeholder="Enter password (e.g. admin123)">
                </div>
                
                <button type="submit" class="btn-primary-custom w-100 py-3 mt-2">Sign In</button>
            </form>
            
            <div class="footer-hint mt-4">
                <p class="mb-1 text-mutedSmall">Demo credentials:</p>
                <code class="credentials-tag">admin / admin123</code> or <code class="credentials-tag">manager / manager123</code>
            </div>
        </div>
    </div>
</body>
</html>
